# Health & Psychology topic — Ph.D. psychology lens
# Senders: match real From addresses you receive; below use example.com (reserved for docs).

name: health_psy
display_name: "Health & Psychology — week of {date}"
senders:
  - Melbourne Centre for Behaviour Change <mcbc-psych@unimelb.edu.au>
  - Academia Mental Health and Well-Being <updates@academia-mail.com>

keywords:
  - psychology
  - mental health
  - wellbeing
  - well-being
  - wellness

folders:
  - "INBOX"
window_days: 30
extract_model: cheap
synthesize_model: cheap
persona_prompt: |
  You are summarizing for Chaehan, a Ph.D. in psychology (Yonsei University)
  with 2 years of lecturing and 6.5 years as professor in design psychology.
  Skip beginner advice — assume graduate-level understanding of research methods,
  statistics, and psychological mechanisms. Prioritize: (1) mechanism-level claims
  with empirical backing, (2) integrative cross-source insights, (3) effect sizes
  and quantitative findings when available. Avoid self-help framing, "tips,"
  and surface-level commentary. Prefer numbers and mechanisms over anecdotes.
trending:
  min_cluster_size: 2
  similarity_threshold: 0.62
  algorithm: hdbscan
output:
  template: digest_html
  also_email_to: "self"
