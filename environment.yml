# Minimal dev env (mamba / conda). After create/activate, install the package editable:
#   mamba env create -f environment.yml
#   mamba activate email-digest
#   pip install -e ".[dev]"
name: email-digest
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pytest>=8
  - pip:
    - litellm>=1.55.0
    - pyyaml>=6.0.0
    - numpy>=1.26.0
    - hdbscan>=0.8.33
    - sentence-transformers>=3.0.0
    - jinja2>=3.1.0
